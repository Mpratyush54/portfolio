<div class="project-card glass-panel" [routerLink]="['/projects', project._id]">
    <div class="card-content">
        <div class="card-top-row">
            <!-- Source Badge -->
            @if (project.source) {
            <div class="source-badge" [class]="project.source">
                <span class="source-icon">{{ project.source === 'github' ? '&#x1F5A5;' : '&#x1F4C1;' }}</span>
                <span class="source-label">{{ project.source === 'github' ? 'GitHub' : 'GitLab' }}</span>
            </div>
            }

            <!-- Status Badge -->
            <div class="status-badge-container" [class]="statusBadge.type">
                <div class="badge-label">
                    <span class="dot"></span>
                    {{ statusBadge.label }}
                </div>
                <div class="badge-tooltip">
                    {{ availabilityText }}
                </div>
            </div>
        </div>
        <h3>{{ project.title }}</h3>
        <p class="description">{{ project.shortDescription }}</p>

        <div class="tags">
            @for (tag of project.tags; track tag) {
            <span class="tag">{{ tag }}</span>
            }
        </div>

        <div class="card-footer">
            <span class="details-link">View Details →</span>
        </div>
    </div>
</div>
