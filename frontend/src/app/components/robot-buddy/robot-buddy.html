<div class="robot-widget" [class.open]="open">

  <!-- Chat Panel -->
  <div class="chat-panel" (click)="$event.stopPropagation()">
    <div class="chat-header">
      <span class="chat-name">Bud — AI Guide</span>
      <button class="chat-close" (click)="open = false">&times;</button>
    </div>

    <div class="chat-body" #chatBody>
      @for (msg of messages; track msg) {
      <div class="chat-msg" [class.question]="msg.type === 'question'" [class.answer]="msg.type === 'answer'">
        <div class="msg-bubble" [innerHTML]="msg.text"></div>
      </div>
      }

      @if (!selectedQuestion) {
      <div class="qa-grid">
        @for (qa of qaPairs; track qa.question) {
        <button class="qa-btn" (click)="ask(qa)">
          {{ qa.question }}
        </button>
        }
      </div>
      }
    </div>
  </div>

  <!-- Robot Button -->
  <button class="robot-btn" (click)="toggle()" [class.active]="open">
    <div #robotCanvas class="robot-canvas"></div>
    <span class="robot-label">Bud</span>
  </button>
</div>
