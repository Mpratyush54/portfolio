<section #sectionEl class="story-section" [class.ready]="ready">
  <div #storyCanvas class="story-canvas"></div>

  <div class="story-ui">
    <header class="story-header">
      <h2 class="story-title">My Journey</h2>
      <div class="progress-track">
        @for (m of milestones; track m.year; let i = $index) {
        <button class="progress-dot" [class.active]="i === activeIndex" [class.done]="i < activeIndex"
          [style.--dot-color]="m.color" (click)="goTo(i)"></button>
        }
      </div>
    </header>

    <div class="milestone-stage">
      @for (m of milestones; track m.year; let i = $index) {
      <div class="milestone-card" [class.visible]="i === activeIndex" [style.--card-color]="m.color">
        <span class="milestone-year">{{ m.year }}</span>
        <h3 class="milestone-title">{{ m.title }}</h3>
        <p class="milestone-desc">{{ m.description }}</p>
      </div>
      }
    </div>

    <div class="story-footer">
      <span class="scroll-hint">{{ activeIndex + 1 }} / {{ totalMilestones }}</span>
    </div>
  </div>
</section>
