<section class="story-section">
  <div #storyCanvas class="story-canvas"></div>

  <header class="story-header">
    <h2 class="story-title">My Journey</h2>
    <p class="story-subtitle">From first commit to production at scale</p>
  </header>

  <div class="milestone-track">
    @for (m of milestones; track m.year; let i = $index) {
    <div class="milestone" [style.--i]="i" [style.--color]="'#' + m.color.toString(16).padStart(6, '0')">
      <div class="milestone-dot"></div>
      <div class="milestone-card">
        <span class="milestone-year">{{ m.year }}</span>
        <h3 class="milestone-title">{{ m.title }}</h3>
        <p class="milestone-desc">{{ m.description }}</p>
      </div>
    </div>
    }
  </div>
</section>
