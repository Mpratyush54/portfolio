<div class="home-container">
  <section class="hero-section">

    <app-hero-scene class="hero-scene-bg"></app-hero-scene>

    <div class="hero-wordmark" aria-hidden="true">
      <span class="wordmark-line">PRATYUSH</span>
      <span class="wordmark-line">MISHRA</span>
    </div>

    <div class="hero-branding">
      <h1 class="brand-name">pratyush mishra.</h1>
      <div class="brand-tags">
        <span class="tag">Backend Engineer</span>
        <span class="tag">Tech Lead</span>
        <span class="tag">Full Stack Dev</span>
        <span class="tag">CHRIST&nbsp;Univ</span>
      </div>
    </div>

    <div class="hero-message">
      <p class="message-text">building systems that scale.<br>one deploy at a time.</p>
    </div>

    <nav class="floating-nav">
      <a routerLink="/" class="nav-item active">Home</a>
      <a routerLink="/projects" class="nav-item">Work</a>
      <a routerLink="/about" class="nav-item">About</a>
      <a routerLink="/contact" class="nav-item">Contact</a>
      <a routerLink="/resume/Pratyush_mishra_SDE.pdf" class="nav-item" target="_blank">Resume</a>
    </nav>

    <div class="hero-chips">
      <button class="chip" (click)="triggerQnA('who')">who is pratyush?</button>
      <button class="chip" (click)="triggerQnA('built')">what has he built?</button>
      <button class="chip" (click)="triggerQnA('work')">is he open to work?</button>
    </div>

    <div class="hero-controls">
      <button class="ctrl-btn" title="Toggle chat" (click)="toggleChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="ctrl-btn" title="View projects" routerLink="/projects">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="ctrl-btn" title="Terminal (L)" (click)="openTerminal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>
    </div>

    <div class="idea-label">
      <span class="idea-title">PROJECTS</span>
      <span class="idea-sub">8+ projects shipped &mdash; Latest: CAPS Automation</span>
    </div>

  </section>
</div>
